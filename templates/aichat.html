<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Gemorecom — AI Chat</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0e27; color: #e0e0e0; display: flex; flex-direction: column; height: 100vh; }
    
    .header { background: linear-gradient(135deg, #1a1f3a 0%, #16213e 100%); border-bottom: 1px solid #2d3561; padding: 1.2rem 2rem; display: flex; justify-content: space-between; align-items: center; position: static !important; top: auto !important; left: auto !important; transform: none !important; width: 100% !important; max-width: 100% !important; z-index: auto !important; }
    .brand { display: flex; align-items: center; gap: 1rem; }
    .logo { width: 48px; height: 48px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.5rem; color: white; }
    .brand h1 { font-size: 1.5rem; font-weight: 700; color: white; }
    .brand .small { font-size: 0.8rem; color: #a0a0c0; margin-top: 0.2rem; }
    .nav-actions { display: flex; gap: 1rem; }
    
    .container { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    
    .chat-panel { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1rem; scrollbar-width: thin; scrollbar-color: #3d4570 #0a0e27; }
    .chat-panel::-webkit-scrollbar { width: 8px; }
    .chat-panel::-webkit-scrollbar-track { background: #0a0e27; }
    .chat-panel::-webkit-scrollbar-thumb { background: #3d4570; border-radius: 4px; }
    
    .message-wrapper { display: flex; width: 100%; }
    .message-wrapper.user { justify-content: flex-end; }
    .message-wrapper.bot { justify-content: flex-start; }
    
    .chat-bubble { padding: 0.9rem 1.2rem; border-radius: 16px; max-width: 70%; word-wrap: break-word; animation: slideIn 0.3s ease; line-height: 1.6; font-size: 0.95rem; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3); }
    .chat-bubble.user { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 16px 4px 16px 16px; }
    .chat-bubble.bot { background: #1a1f3a; border: 1px solid #2d3561; color: #e0e0e0; border-radius: 4px 16px 16px 16px; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .input-area { padding: 1.5rem 2rem; background: #0a0e27; border-top: 1px solid #2d3561; }
    .controls-row { display: flex; gap: 0.8rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .btn { padding: 0.7rem 1.2rem; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: 500; transition: all 0.3s; background: #2d3561; color: #e0e0e0; }
    .btn:hover { background: #3d4570; transform: translateY(-2px); }
    .btn.primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .btn.primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    
    .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; }
    .file-input-wrapper input[type=file] { position: absolute; left: -9999px; }
    .file-name { font-size: 0.85rem; color: #a0a0c0; display: inline-flex; align-items: center; gap: 0.5rem; }
    
    #inputText { width: 100%; padding: 1rem; border: 1px solid #2d3561; border-radius: 8px; background: #1a1f3a; color: #e0e0e0; font-size: 1rem; resize: none; max-height: 120px; font-family: inherit; transition: border-color 0.3s; }
    #inputText:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
    
    .chat-controls { display: flex; gap: 1rem; align-items: center; }
    .knob { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; color: #a0a0c0; }
    .knob input { width: 60px; padding: 0.4rem; border: 1px solid #2d3561; border-radius: 6px; background: #1a1f3a; color: #e0e0e0; }
    
    .loading-dots { display: inline-block; }
    .loading-dots span { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #667eea; margin: 0 4px; animation: pulse 1.4s infinite; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%, 60%, 100% { opacity: 0.6; transform: scale(0.8); } 30% { opacity: 1; transform: scale(1); } }
    
    .error-msg { color: #ff6b6b; padding: 0.8rem; background: rgba(255, 107, 107, 0.1); border-left: 3px solid #ff6b6b; border-radius: 4px; }
  </style>
</head>
<body>
  <header class="header">
    <div class="brand">
      <div class="logo">G</div>
      <div>
        <h1>Gemorecom Chat</h1>
        <div class="small">AI Game Asset Generator</div>
      </div>
    </div>
    <div class="nav-actions">
      <a class="btn" href="/">← Home</a>
    </div>
  </header>

  <div class="container">
    <div class="chat-panel" id="chatPanel"></div>

    <div class="input-area">
      <div class="controls-row">
        <div class="file-input-wrapper">
          <label for="fileInput" class="btn">📎 Attach</label>
          <input id="fileInput" type="file" accept=".txt,.pdf" />
        </div>
        <span class="file-name" id="fileName"></span>
        <button id="clearBtn" class="btn">🗑️ Clear</button>
      </div>

      <textarea id="inputText" placeholder="Ask Gemorecom... (Shift+Enter for new line, Enter to send)"></textarea>
      
      <div class="chat-controls" style="margin-top: 1rem;">
        <div class="knob">Temp <input id="temp" type="number" min="0" max="2" step="0.1" value="0.8"></div>
        <div class="knob">Seed <input id="seed" type="number" value=""></div>
        <button id="sendBtn" class="btn primary" style="flex: 1;">Send</button>
      </div>
    </div>
  </div>

  <script>
    let uploadedFileContent = null;
    let isGenerating = false;

    const panel = document.getElementById('chatPanel');
    const input = document.getElementById('inputText');
    const btn = document.getElementById('sendBtn');
    const tempEl = document.getElementById('temp');
    const seedEl = document.getElementById('seed');
    const fileInput = document.getElementById('fileInput');
    const fileNameEl = document.getElementById('fileName');
    const clearBtn = document.getElementById('clearBtn');

    function addMessage(text, role = 'bot') {
      const wrapper = document.createElement('div');
      wrapper.className = `message-wrapper ${role}`;
      const bubble = document.createElement('div');
      bubble.className = `chat-bubble ${role}`;
      bubble.textContent = text;
      wrapper.appendChild(bubble);
      panel.appendChild(wrapper);
      panel.scrollTop = panel.scrollHeight;
      return bubble;
    }

    function appendToLastMessage(text) {
      const bubbles = panel.querySelectorAll('.chat-bubble.bot');
      if (bubbles.length > 0) {
        const last = bubbles[bubbles.length - 1];
        last.textContent += text;
        panel.scrollTop = panel.scrollHeight;
        return last;
      }
    }

    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append('file', file);

      try {
        const resp = await fetch('/api/upload-file', {
          method: 'POST',
          body: formData
        });
        const data = await resp.json();
        
        if (data.success) {
          uploadedFileContent = data.content;
          fileNameEl.textContent = `✓ ${data.filename}`;
          addMessage(`📄 "${data.filename}" uploaded! Use @file in prompts to reference it.`, 'bot');
        } else {
          addMessage(`❌ ${data.error}`, 'bot');
        }
      } catch (err) {
        addMessage(`❌ Upload failed: ${err.message}`, 'bot');
      }
    });

    clearBtn.addEventListener('click', () => {
      panel.innerHTML = '';
      uploadedFileContent = null;
      fileNameEl.textContent = '';
      fileInput.value = '';
      input.value = '';
    });

    async function generate() {
      if (isGenerating) return;

      const text = input.value.trim();
      if (!text) return;

      isGenerating = true;
      btn.disabled = true;

      addMessage(text, 'user');
      input.value = '';

      const body = {
        prompt: text.replace('@file', ''),
        temperature: parseFloat(tempEl.value),
        seed: seedEl.value ? Number(seedEl.value) : null
      };

      if (uploadedFileContent && text.includes('@file')) {
        body.file_content = uploadedFileContent;
      }

      const msgBubble = addMessage('');
      
      try {
        const resp = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');

          for (let i = 0; i < lines.length - 1; i++) {
            const line = lines[i].trim();
            if (!line) continue;

            try {
              const json = JSON.parse(line);
              if (json.type === 'done') {
                // Stream finished
              } else if (json.token) {
                msgBubble.textContent += json.token;
                panel.scrollTop = panel.scrollHeight;
              }
            } catch (e) {
              // Skip invalid JSON
            }
          }

          buffer = lines[lines.length - 1];
        }

        if (buffer.trim()) {
          try {
            const json = JSON.parse(buffer);
            if (json.token) {
              msgBubble.textContent += json.token;
            }
          } catch (e) {}
        }

      } catch (err) {
        msgBubble.innerHTML = `<div class="error-msg">❌ Error: ${err.message}</div>`;
      } finally {
        isGenerating = false;
        btn.disabled = false;
        input.focus();
      }
    }

    btn.addEventListener('click', generate);

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey && !isGenerating) {
        e.preventDefault();
        generate();
      }
    });

    addMessage('👋 Hi! I\'m Gemorecom. Ask me to generate game assets:\n• "5 dragon names for a frost theme"\n• "Create a haunted forest quest"\n• "Legendary sword with abilities"\n\n📎 Upload files (.txt, .pdf) and use @file to reference them!', 'bot');
  </script>
</body>
</html>
